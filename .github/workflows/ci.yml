name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: '6.3'

      - name: Install Dependencies
        run: |
          brew install libsodium opus ffmpeg yt-dlp swiftformat

      - name: Check Formatting
        run: swiftformat --lint .

      - name: Build Flight Library
        run: swift build -c release

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: '6.3'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev libopus-dev ffmpeg python3
          
      - name: Build Flight Library
        run: swift build -c release
